<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2a5298" />
    <meta name="description" content="National Railway System - Book train tickets, view schedules, and manage your railway journeys" />
    
    <!-- SEO Meta Tags -->
    <meta name="keywords" content="railway, train, tickets, booking, Pakistan railways, train schedule" />
    <meta name="author" content="Taha Ijaz, Abdul Rehman, Mian Bilal Razzaq" />
    
    <!-- Open Graph Tags for Social Media -->
    <meta property="og:title" content="National Railway System" />
    <meta property="og:description" content="Book train tickets and manage your railway journeys online" />
    <meta property="og:type" content="website" />
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>National Railway System | Book Train Tickets Online</title>
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Fallback styles while React loads */
        .loading-fallback {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef9e6 0%, #fff5e6 100%);
            color: #333;
            flex-direction: column;
            gap: 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 193, 7, 0.3);
            border-top-color: #FFC107;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #FF5722;
        }
        
        .loading-subtext {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
            <h1>National Railway System</h1>
            <p>Please enable JavaScript to use this application.</p>
            <p>JavaScript is required for booking tickets, viewing schedules, and managing your account.</p>
        </div>
    </noscript>
    
    <div id="root">
        <!-- Fallback loading indicator while React loads -->
        <div class="loading-fallback">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading National Railway System...</div>
            <div class="loading-subtext">Please wait while we prepare your experience</div>
        </div>
    </div>
    
    <!-- 
        The React app will mount here.
        This file is the entry point for the frontend application.
        All React components will be rendered into the div with id="root".
    -->
</body>
</html>
